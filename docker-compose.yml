# docker-compose.yml — one-command local stack.
#
#   1. cp .env.example .env   (and fill in GROQ_API_KEY + SECRET_KEY)
#   2. docker compose up --build
#
#   Frontend → http://localhost:8080
#   Backend  → http://localhost:8000  (docs at /docs)
#
# The backend's DATABASE_URL / ENVIRONMENT / ALLOWED_ORIGINS are set here and
# OVERRIDE whatever is in .env, so the same .env works for both local-native
# (host = localhost) and docker (host = db) runs.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_support_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_support_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_support_platform}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
    ports:
      # Host 8001 -> container 8000. Host :8000 is commonly taken (this dev box
      # runs a native Postgres there); the container always listens on 8000.
      # The app is also reachable via the frontend proxy at http://localhost:8080/api.
      - "8001:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  pgdata:
