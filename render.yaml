# render.yaml — Render Blueprint for the AI Support Intelligence Platform.
#
# Deploys three resources:
#   1. support-db        — managed PostgreSQL (free)
#   2. support-backend   — FastAPI in Docker (free web service)
#   3. support-frontend  — static React build (free), proxying /api/* to the backend
#
# How to use:
#   1. Push this file to GitHub (already done).
#   2. Render Dashboard → New → Blueprint → pick this repo.
#   3. When prompted, paste your GROQ_API_KEY (the only secret Render can't generate).
#   4. After the backend deploys, copy its URL and update the frontend's
#      /api/* rewrite "destination" below if the backend name differs.
#
# Notes:
#   - Free web services sleep after ~15 min idle (first request then cold-starts).
#   - Free Postgres is removed after 30 days unless upgraded.
#   - ENVIRONMENT=staging keeps Swagger /docs visible. Switch to "production"
#     (and set ALLOWED_ORIGINS to the frontend URL) to harden it.

databases:
  - name: support-db
    plan: free
    databaseName: ai_support_platform
    user: support

services:
  # ── Backend API (FastAPI, Docker) ────────────────────────────────────────
  - type: web
    name: support-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: support-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong random value
      - key: ENVIRONMENT
        value: staging
      - key: GROQ_API_KEY
        sync: false                  # you paste this at deploy time (secret)
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      # Cloudinary (optional — ticket screenshots). Safe to leave blank;
      # the upload feature simply stays disabled until all three are set.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Frontend (static site + API proxy) ───────────────────────────────────
  - type: web
    name: support-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Proxy API calls to the backend (server-side → no CORS in the browser).
      # If your backend gets a different URL, update this destination.
      - type: rewrite
        source: /api/*
        destination: https://support-backend.onrender.com/api/*
      # SPA fallback — React Router owns client-side routes.
      - type: rewrite
        source: /*
        destination: /index.html
