server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets for faster loads.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets change name on every build, so cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html — it references the latest hashed assets, so a
    # new deploy must be picked up immediately (avoids stale-bundle issues).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — React Router owns client-side routes, so any unknown
    # path must return index.html rather than a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend service on the compose network.
    # The full path (e.g. /api/v1/tickets) is preserved.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
